name: Add Hokkaido Jan 25-31 Draft Plans

on:
  workflow_dispatch:

jobs:
  add-plans:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add draft plans to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/add-hokkaido-jan25-31.js
