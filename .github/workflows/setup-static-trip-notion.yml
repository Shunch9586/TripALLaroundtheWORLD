name: Setup Static Trip in Notion

on:
  workflow_dispatch:
    inputs:
      trip_id:
        description: 'Static trip id to create in Notion, or all'
        required: true
        default: 'all'

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Notion trip databases and import rows
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: npm run setup:static:notion -- "${{ inputs.trip_id }}"

      - name: Commit Notion IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: setup static trip notion data"
          git push
